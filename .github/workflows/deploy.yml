name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: hugo --minify

      - name: Deploy to local web root
        run: rsync -av --delete public/ /var/www/arpg_colorado_edu/
